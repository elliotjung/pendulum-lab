version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Small per-toolchain groups: one stuck major (e.g. a vitest breaking
    # change) must not hold back security patches for the other tools.
    groups:
      vitest:
        patterns:
          - vitest
          - '@vitest/*'
      vite:
        patterns:
          - vite
          - vite-plugin-singlefile
      stryker:
        patterns:
          - '@stryker-mutator/*'
      playwright:
        patterns:
          - '@playwright/*'
          - '@axe-core/playwright'
      typescript-tooling:
        patterns:
          - typescript
          - tsx
          - typedoc
          - '@types/*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
