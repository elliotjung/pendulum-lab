name: Evidence Dispatch

# Structural fix for cross-repo evidence drift: whenever the committed
# evidence summary changes on the default branch, tell the landing repo so its
# evidence-sync workflow can pull, re-verify, and auto-commit the new summary.
# Releases additionally dispatch `pendulum-release` from release.yml; this
# lane covers the ordinary between-release cadence.

on:
  push:
    branches: [main, master]
    paths:
      - reports/evidence-summary.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidence-dispatch
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Notify landing evidence sync
        env:
          LANDING_DISPATCH_TOKEN: ${{ secrets.LANDING_DISPATCH_TOKEN }}
        shell: bash
        run: |
          if [ -z "$LANDING_DISPATCH_TOKEN" ]; then
            printf '## Evidence dispatch: blocked\n\n`LANDING_DISPATCH_TOKEN` is required; no synchronization was claimed.\n' >> "$GITHUB_STEP_SUMMARY"
            echo "LANDING_DISPATCH_TOKEN is required; landing evidence sync did not run." >&2
            exit 1
          fi
          evidence_source_commit="$(node -e "const r=require('./reports/evidence-summary.json'); process.stdout.write(r.provenance.sourceCommit)")"
          curl --fail-with-body --retry 3 \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $LANDING_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/elliotjung/pendulum-landing/dispatches \
            -d "{\"event_type\":\"evidence-updated\",\"client_payload\":{\"source_commit\":\"$evidence_source_commit\",\"pushed_commit\":\"$GITHUB_SHA\"}}"
          printf '## Evidence dispatch: sent\n\nLanding synchronization was requested for `%s`.\n' "$GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
