name: WebGPU Vendor Evidence

on:
  workflow_dispatch:
    inputs:
      vendor:
        description: Physical adapter vendor label registered on the runner
        required: true
        type: choice
        options: [intel, nvidia, amd]

jobs:
  validate-vendor:
    runs-on: [self-hosted, webgpu, "${{ inputs.vendor }}"]
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
      - run: npm ci
      - run: npx playwright install chrome
      - name: Free Vite test port
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $listeners = Get-NetTCPConnection -LocalPort 5173 -State Listen -ErrorAction SilentlyContinue
          foreach ($listener in $listeners) {
            Stop-Process -Id $listener.OwningProcess -Force -ErrorAction SilentlyContinue
          }
      - run: npm run test:webgpu-hardware
        env:
          WEBGPU_BROWSER_CHANNEL: chrome
      - run: npm run benchmark:gpu-ladder
        env:
          WEBGPU_BROWSER_CHANNEL: chrome
      - uses: actions/upload-artifact@v4
        with:
          name: gpu-ladder-${{ inputs.vendor }}
          path: reports/gpu-benchmark-ladder.*
