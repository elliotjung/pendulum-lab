name: Nightly Mutation

on:
  schedule:
    - cron: '17 3 * * 1'  # Mon 03:17 UTC
  workflow_dispatch:

jobs:
  mutation:
    name: mutation (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: integrators-helpers
            mutate: src/physics/integrators.ts:1-40
          - name: integrators-registry-a
            mutate: src/physics/integrators.ts:41-108
          - name: integrators-registry-b
            mutate: src/physics/integrators.ts:109-177
          - name: integrators-explicit
            mutate: src/physics/integrators.ts:178-289
          - name: integrators-symplectic
            mutate: src/physics/integrators.ts:290-360
          - name: integrators-adaptive
            mutate: src/physics/integrators.ts:361-460
          - name: integrators-dispatch
            mutate: src/physics/integrators.ts:461-520
          - name: linear-solve-gaussian
            mutate: src/physics/linearSolve.ts:1-160
          - name: linear-solve-cholesky-core
            mutate: src/physics/linearSolve.ts:161-230
          - name: linear-solve-cholesky-api
            mutate: src/physics/linearSolve.ts:231-289
          - name: n-pendulum
            mutate: src/physics/nPendulum.ts
          - name: double
            mutate: src/physics/double.ts
          - name: double-string
            mutate: src/physics/doubleString.ts
          - name: spherical-chain
            mutate: src/physics/sphericalChain.ts
          - name: spherical-embedded-chain
            mutate: src/physics/sphericalEmbeddedChain.ts
          - name: stochastic
            mutate: src/physics/stochastic.ts
          - name: melnikov
            mutate: src/chaos/melnikov.ts
          - name: lyapunov
            mutate: src/chaos/lyapunov.ts
          - name: rqa
            mutate: src/chaos/rqa.ts
          - name: ftle
            mutate: src/chaos/ftle.ts
          - name: arnold-tongue
            mutate: src/chaos/arnoldTongue.ts
          - name: torus-analysis
            mutate: src/chaos/torusAnalysis.ts
          - name: structure-preservation
            mutate: src/research/structurePreservation.ts
          - name: parameter-estimation
            mutate: src/research/parameterEstimation.ts
          - name: surrogate-basis
            mutate: src/research/surrogate.ts:1-120
          - name: surrogate-fit
            mutate: src/research/surrogate.ts:121-223
          - name: zip-bundle
            mutate: src/research/zipBundle.ts
          - name: research-db
            mutate: src/research/researchDb.ts
          - name: job-protocol
            mutate: src/workers/jobProtocol.ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run mutation -- --mutate "${{ matrix.shard.mutate }}" stryker.shard.config.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report-${{ matrix.shard.name }}
          path: reports/mutation/

  aggregate:
    name: mutation aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: mutation
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: mutation-report-*
          path: reports/mutation-shards
          merge-multiple: false
      # Ratchet floor prevents regression; the report remains explicitly "low"
      # until the 70% quality target is reached, then the floor can advance.
      - run: npm run mutation:aggregate -- reports/mutation-shards --out-dir reports --break 65 --low 70 --high 85
      - name: Require every shard to complete
        run: |
          if [ "${{ needs.mutation.result }}" != "success" ]; then
            echo "One or more mutation shards failed before producing a valid report."
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-aggregate
          path: |
            reports/mutation-aggregate.*
            reports/mutation-survivor-triage.*
