name: Publish JSR package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate without publishing
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-jsr
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Keep package and JSR versions aligned
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          jsr_version="$(node -p "require('./jsr.json').version")"
          test "$package_version" = "$jsr_version" || {
            echo "package.json=$package_version but jsr.json=$jsr_version" >&2
            exit 1
          }
      - run: npm run verify
      - name: Reject unexpected tracked rewrites from verification
        shell: bash
        run: |
          git diff --exit-code -- . ':(exclude)reports/vitest-results.json'
          git restore --worktree -- reports/vitest-results.json
          git diff --exit-code
      - name: JSR publish dry run
        if: ${{ inputs.dry_run }}
        run: npm run jsr:check
      - name: Publish to JSR with OIDC provenance
        if: ${{ !inputs.dry_run }}
        run: npm run jsr:publish
        # Create @elliotjung/pendulum-lab on jsr.io and link this GitHub repo
        # once. JSR then accepts this workflow's OIDC token without a secret.
