name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish without uploading
        type: boolean
        default: true
      expected_version:
        description: Exact package version expected at publish time
        type: string
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Pin OIDC-capable npm
        run: npm install --global npm@11.5.1
      - name: Verify release coordinate
        shell: bash
        run: |
          actual="$(node -p "require('./package.json').version")"
          expected="${{ inputs.expected_version }}"
          test "$actual" = "$expected" || {
            echo "Expected $expected, found $actual" >&2
            exit 1
          }
          npm view "@elliotjung/pendulum-lab@$actual" version >/dev/null 2>&1 && {
            echo "@elliotjung/pendulum-lab@$actual is already published" >&2
            exit 1
          }
          true
      - run: npm ci
      - run: npm run verify
      - name: Reject unexpected tracked rewrites from verification
        shell: bash
        run: |
          git diff --exit-code -- . ':(exclude)reports/vitest-results.json'
          git restore --worktree -- reports/vitest-results.json
          git diff --exit-code
      - run: npm run build:lib
      - name: Publish dry-run
        if: ${{ inputs.dry_run }}
        run: npm publish --access public --dry-run
      - name: Publish with npm Trusted Publishing
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public
        # npm >=11.5.1 detects the GitHub OIDC token. Configure the package's
        # trusted publisher for this exact workflow filename and `npm`
        # environment. Public OIDC publishes receive npm provenance by default.
