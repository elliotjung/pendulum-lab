name: Cloudflare Pages mirror

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run build
      - name: Deploy the COOP/COEP-enabled mirror
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" && test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "Cloudflare mirror skipped: configure project-scoped CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
            exit 0
          }
          npx wrangler pages deploy dist --project-name pendulum-lab --branch "${GITHUB_REF_NAME}"
