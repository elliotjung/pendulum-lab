name: PR Verify

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Supply-chain gate: the toolchain that generates research artifacts and
      # signs releases must not carry known high/critical advisories.
      - run: npm run audit:deps
      # Fast style signal: the repository Prettier config is enforced
      # (also re-checked at the end of npm run verify after docs:sync writes).
      - run: npm run format:check
      # Fast PR signal: quick unit tier before the full policy/type/test gate.
      - run: npm run test:quick
      # Scientific acceleration contract: GPU paths must agree with CPU or fall back.
      - run: npm run validate:gpu-scale
      # Reviewer kit manifest must stay generatable from a clean checkout.
      - run: npm run reviewer:kit
      # Full PR gate: policy lint, typecheck, unit JSON report, synced docs.
      - run: npm run verify
      - name: Reject unexpected tracked rewrites from verification
        shell: bash
        run: |
          git diff --exit-code -- . ':(exclude)reports/vitest-results.json'
          git restore --worktree -- reports/vitest-results.json
          git diff --exit-code
      # Keep the served-app CSP / no-legacy-risk contract from regressing on PRs.
      - run: npm run audit:legacy
      - run: npm run audit:mojibake:strict
      # Coverage ratchet also runs on PRs, including the coverage-scope guard
      # that catches newly added source files missing from the v8 coverage map.
      - run: npm run test:coverage
      - run: npm run build
      # Public-package declarations and all library entry points are a PR gate,
      # not a release-only surprise.
      - run: npm run build:lib
      - run: npm run build:standalone
      # The compact committed manifest pins the release-only standalone bytes.
      - run: npm run check:standalone-sync
      # Same drift contract for the committed WASM ensemble kernel.
      - run: npm run check:wasm-sync
      - run: npm run budget
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
        env:
          PLAYWRIGHT_USE_PREVIEW: '1'
      - run: npx playwright test e2e/accessibility.spec.ts e2e/research-storage.spec.ts e2e/research-bundle-zip.spec.ts e2e/ui-polish.spec.ts --project=chromium
        env:
          PLAYWRIGHT_USE_PREVIEW: '1'

  node-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 26]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run audit:deps
      - run: npm run typecheck
      - run: npm run test:quick

  # Real A/B performance gate: build the PR merge-base and the PR head, serve
  # them on separate ports, and sample both interleaved in one browser process.
  # Sampling the same URL twice is rejected by the benchmark script itself.
  benchmark-compare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build PR candidate
        run: npm run build
      - name: Build merge-base baseline in a worktree
        run: |
          BASE_SHA=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          echo "Baseline commit: $BASE_SHA"
          git worktree add /tmp/baseline "$BASE_SHA"
          cd /tmp/baseline
          npm ci
          npm run build
      - name: Serve both builds and run compare benchmark
        run: |
          (cd /tmp/baseline && npx vite preview --host 127.0.0.1 --port 4173 &)
          npx vite preview --host 127.0.0.1 --port 4174 &
          ORIGINAL_URL=http://127.0.0.1:4173/ CANDIDATE_URL=http://127.0.0.1:4174/ npm run benchmark
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: benchmark-compare-report
          path: |
            reports/benchmark-report.json
            reports/benchmark-report.md

  docker-reproducibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build the digest-pinned non-root validation image
        run: docker build --pull=false --tag pendulum-lab-validation:${{ github.sha }} .
      - name: Prove the container executes as the unprivileged node user
        run: |
          test "$(docker run --rm pendulum-lab-validation:${{ github.sha }} id -u)" = "1000"
          docker run --rm pendulum-lab-validation:${{ github.sha }} npm run typecheck
