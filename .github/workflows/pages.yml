name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      # The build uses relative asset paths (vite base './'), so it serves
      # correctly from the repository sub-path GitHub Pages uses.
      - run: npm run build
      - name: Include the longitudinal benchmark dashboard when available
        shell: bash
        run: |
          mkdir -p dist/reports/benchmarks
          for file in index.html history.json; do
            curl --fail --silent --show-error --retry 3 \
              -o "dist/reports/benchmarks/$file" \
              "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/benchmark-history/$file" || rm -f "dist/reports/benchmarks/$file"
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
