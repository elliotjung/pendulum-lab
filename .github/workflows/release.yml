name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify immutable release coordinate
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          jsr_version="$(node -p "require('./jsr.json').version")"
          citation_version="$(node -e "const fs=require('fs'); const m=fs.readFileSync('CITATION.cff','utf8').match(/^version:\s*['\"]?([^'\"\r\n]+)/m); process.stdout.write(m?.[1]??'')")"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$tag_version" = "$package_version" && test "$package_version" = "$jsr_version" && test "$package_version" = "$citation_version" || {
            echo "tag=$tag_version package=$package_version jsr=$jsr_version citation=$citation_version" >&2
            exit 1
          }
      - run: npm run verify
      - name: Reject unexpected tracked rewrites before packaging
        shell: bash
        run: |
          git diff --exit-code -- . ':(exclude)reports/vitest-results.json'
          git restore --worktree -- reports/vitest-results.json
          git diff --exit-code
      - run: npm run build
      - run: npm run build:standalone
      - run: npm run check:standalone-sync
      - run: npm run check:wasm-sync
      - run: npx playwright install --with-deps chromium
      - name: Install PDF visual-verification renderer
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: npm run smoke:standalone
      - run: npm run build:lib
      - run: npm run budget
      - run: npm run docs:api
      - run: npm run release:package
      - run: npm run audit:worldclass
      - name: Pack public library
        shell: bash
        run: |
          npm pack --json > reports/npm-pack.json
          package_file="$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('reports/npm-pack.json')); process.stdout.write(p[0].filename)")"
          echo "PACKAGE_FILE=$package_file" >> "$GITHUB_ENV"
          sha256sum "$package_file" > reports/npm-package.sha256
          sha256sum "$package_file" reports/portfolio-korean.pdf reports/portfolio-korean-pdf-validation.json reports/demo-narrated-ko.mp4 reports/demo-narrated-ko.vtt > reports/release-checksums.txt
      - name: Install the packed tarball in a clean consumer project
        shell: bash
        run: |
          consumer_dir="$(mktemp -d)"
          npm --prefix "$consumer_dir" init --yes >/dev/null
          npm --prefix "$consumer_dir" install --ignore-scripts "$GITHUB_WORKSPACE/$PACKAGE_FILE"
          (
            cd "$consumer_dir"
            node --input-type=module -e "const m=await import('@elliotjung/pendulum-lab'); if(Object.keys(m).length===0) throw new Error('package exports are empty')"
          )
      - name: Package the double-click standalone app
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          portable_html="pendulum-lab-standalone-${GITHUB_REF_NAME}.html"
          portable_zip="pendulum-lab-standalone-${GITHUB_REF_NAME}.zip"
          cp standalone/index.html "$portable_html"
          (cd standalone && zip -9 -j "../$portable_zip" index.html *.worker.js)
          sha256sum "$portable_html" "$portable_zip" >> reports/release-checksums.txt
          echo "PORTABLE_HTML=$portable_html" >> "$GITHUB_ENV"
          echo "PORTABLE_ZIP=$portable_zip" >> "$GITHUB_ENV"
      - name: Generate CycloneDX SBOM
        run: npm sbom --package-lock-only --sbom-format cyclonedx > reports/sbom.cdx.json
      - name: Attest package build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ env.PACKAGE_FILE }}
      - name: Attest package SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ env.PACKAGE_FILE }}
          sbom-path: reports/sbom.cdx.json
      - name: Verify release attestations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          source_ref="${GITHUB_REF}"
          npm run release:verify-attestations -- --artifact "${PACKAGE_FILE}" --source-ref "${source_ref}"
      - name: Attach supply-chain artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq .isDraft)"
            test "$is_draft" = "true" || {
              echo "Refusing to overwrite assets on the published release ${GITHUB_REF_NAME}." >&2
              exit 1
            }
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --draft --generate-notes --title "Pendulum Lab ${GITHUB_REF_NAME}"
          fi
          gh release upload "${GITHUB_REF_NAME}" \
            "${PACKAGE_FILE}" "${PORTABLE_HTML}" "${PORTABLE_ZIP}" \
            reports/release-checksums.txt reports/sbom.cdx.json reports/attestation-verification.json \
            reports/release-one-page.pdf reports/portfolio-korean.pdf reports/portfolio-korean-pdf-validation.json \
            reports/demo-narrated-ko.mp4 reports/demo-narrated-ko.vtt reports/demo-narrated-ko.md \
            --clobber
      - name: Preserve the exact npm tarball consumed by the publish job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-npm-package
          path: |
            *.tgz
            reports/npm-package.sha256
          if-no-files-found: error
          retention-days: 7
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pendulum-lab-release
          path: |
            dist/
            standalone/
            dist-lib/
            documents/api/
            reports/worldclass-scorecard.md
            reports/release-readiness.*
            reports/release-one-page.pdf
            reports/portfolio-korean.pdf
            reports/portfolio-korean-pdf-validation.json
            reports/walkthrough-30s.gif
            reports/walkthrough-storyboard.svg
            reports/demo-narrated-ko.mp4
            reports/demo-narrated-ko.vtt
            reports/demo-narrated-ko.md
            reports/npm-pack.json
            reports/release-checksums.txt
            reports/sbom.cdx.json
            reports/attestation-verification.json
            reports/bundle-budget.*
            *.tgz
      - name: Dispatch and wait for the landing release gate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          LANDING_DISPATCH_TOKEN: ${{ secrets.LANDING_DISPATCH_TOKEN }}
        shell: bash
        run: |
          if [ -z "$LANDING_DISPATCH_TOKEN" ]; then
            echo "LANDING_DISPATCH_TOKEN is required for the single-trigger cross-repository release." >&2
            exit 1
          fi
          dispatch_epoch="$(date -u +%s)"
          evidence_source_commit="$(node -e "const r=require('./reports/evidence-summary.json'); process.stdout.write(r.provenance.sourceCommit)")"
          evidence_sha256="$(sha256sum reports/evidence-summary.json | cut -d' ' -f1)"
          evidence_base64="$(base64 -w0 reports/evidence-summary.json)"
          EVIDENCE_BASE64="$evidence_base64" EVIDENCE_SHA256="$evidence_sha256" \
            EVIDENCE_SOURCE_COMMIT="$evidence_source_commit" node -e "const fs=require('fs'); fs.writeFileSync('/tmp/landing-dispatch.json', JSON.stringify({event_type:'pendulum-release',client_payload:{source_commit:process.env.EVIDENCE_SOURCE_COMMIT,release_commit:process.env.GITHUB_SHA,tag:process.env.GITHUB_REF_NAME,orchestrator_run_id:process.env.GITHUB_RUN_ID,evidence_sha256:process.env.EVIDENCE_SHA256,evidence_base64:process.env.EVIDENCE_BASE64}}))"
          curl --fail-with-body --retry 3 \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $LANDING_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/elliotjung/pendulum-landing/dispatches \
            --data-binary @/tmp/landing-dispatch.json

          run_id=""
          expected_title="Cross-repo release ${GITHUB_REF_NAME} from ${GITHUB_RUN_ID}"
          for attempt in $(seq 1 30); do
            runs="$(curl --fail --silent --show-error --retry 3 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $LANDING_DISPATCH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              'https://api.github.com/repos/elliotjung/pendulum-landing/actions/workflows/cross-repo-release.yml/runs?event=repository_dispatch&per_page=10')"
            run_id="$(RUNS="$runs" DISPATCH_EPOCH="$dispatch_epoch" EXPECTED_TITLE="$expected_title" node -e "const r=JSON.parse(process.env.RUNS); const min=Number(process.env.DISPATCH_EPOCH)*1000; const hit=r.workflow_runs.find(x=>Date.parse(x.created_at)>=min&&x.display_title===process.env.EXPECTED_TITLE); process.stdout.write(hit?String(hit.id):'')")"
            [ -n "$run_id" ] && break
            sleep 10
          done
          [ -n "$run_id" ] || { echo "landing release run did not start" >&2; exit 1; }

          for attempt in $(seq 1 180); do
            run="$(curl --fail --silent --show-error --retry 3 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $LANDING_DISPATCH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/elliotjung/pendulum-landing/actions/runs/$run_id")"
            status="$(RUN="$run" node -e "process.stdout.write(JSON.parse(process.env.RUN).status)")"
            conclusion="$(RUN="$run" node -e "process.stdout.write(JSON.parse(process.env.RUN).conclusion||'')")"
            if [ "$status" = "completed" ]; then
              [ "$conclusion" = "success" ] || { echo "landing release run $run_id concluded $conclusion" >&2; exit 1; }
              echo "landing release run $run_id succeeded"
              break
            fi
            [ "$attempt" -lt 180 ] || { echo "landing release run $run_id timed out" >&2; exit 1; }
            sleep 10
          done
      - name: Publish Zenodo record and synchronize DOI when configured
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        shell: bash
        run: |
          if [ -z "$ZENODO_TOKEN" ]; then
            printf '## Zenodo publication: pending owner action\n\n`ZENODO_TOKEN` is not configured; this optional external publication was not claimed as completed.\n' >> "$GITHUB_STEP_SUMMARY"
            echo "ZENODO_TOKEN is not configured; DOI publication remains an owner action."
            exit 0
          fi
          npm run zenodo:publish
          npm run doi:sync

  npm-publish:
    needs: release-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Pin OIDC-capable npm
        run: npm install --global npm@11.5.1
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-npm-package
          path: release-npm
      - name: Verify and publish the scoped npm coordinate
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME#v}" = "$version"
          npm view "@elliotjung/pendulum-lab@$version" version >/dev/null 2>&1 && {
            echo "@elliotjung/pendulum-lab@$version is already published" >&2
            exit 1
          }
          package_file="$(find release-npm -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          [ -n "$package_file" ] || { echo 'release tarball is missing' >&2; exit 1; }
          (cd release-npm && sha256sum --check reports/npm-package.sha256)
          npm publish "$package_file" --access public

  jsr-publish:
    needs: release-artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify and publish the JSR coordinate
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          jsr_version="$(node -p "require('./jsr.json').version")"
          test "${GITHUB_REF_NAME#v}" = "$package_version" && test "$package_version" = "$jsr_version"
          npm run verify
          npm run jsr:publish

  publish-github-release:
    needs: [release-artifacts, npm-publish, jsr-publish]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Publish only after simulator, landing, npm, JSR, and optional DOI gates
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false --latest
