name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run build
      - run: npm run build:standalone
      - run: npm run check:standalone-sync
      - run: npm run build:lib
      - run: npm run budget
      - run: npm run docs:api
      - run: npm run release:package
      - run: npm run audit:worldclass
      - name: Pack public library
        shell: bash
        run: |
          npm pack --json > reports/npm-pack.json
          package_file="$(node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('reports/npm-pack.json')); process.stdout.write(p[0].filename)")"
          echo "PACKAGE_FILE=$package_file" >> "$GITHUB_ENV"
          sha256sum "$package_file" > reports/release-checksums.txt
      - name: Generate CycloneDX SBOM
        run: npm sbom --package-lock-only --sbom-format cyclonedx > reports/sbom.cdx.json
      - name: Attest package build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.PACKAGE_FILE }}
      - name: Attest package SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.PACKAGE_FILE }}
          sbom-path: reports/sbom.cdx.json
      - name: Verify release attestations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          source_ref="${GITHUB_REF}"
          npm run release:verify-attestations -- --artifact "${PACKAGE_FILE}" --source-ref "${source_ref}"
      - name: Attach supply-chain artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${PACKAGE_FILE}" reports/release-checksums.txt reports/sbom.cdx.json reports/attestation-verification.json --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: pendulum-lab-release
          path: |
            dist/
            standalone/
            dist-lib/
            docs/api/
            reports/worldclass-scorecard.md
            reports/release-readiness.*
            reports/release-one-page.pdf
            reports/walkthrough-30s.gif
            reports/walkthrough-storyboard.svg
            reports/npm-pack.json
            reports/release-checksums.txt
            reports/sbom.cdx.json
            reports/attestation-verification.json
            *.tgz
      - name: Notify landing release gate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          LANDING_DISPATCH_TOKEN: ${{ secrets.LANDING_DISPATCH_TOKEN }}
        shell: bash
        run: |
          if [ -z "$LANDING_DISPATCH_TOKEN" ]; then
            echo "LANDING_DISPATCH_TOKEN is not configured; landing coordination was skipped."
            exit 0
          fi
          evidence_source_commit="$(node -e "const r=require('./reports/evidence-summary.json'); process.stdout.write(r.provenance.sourceCommit)")"
          curl --fail-with-body --retry 3 \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $LANDING_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Elliot-Jung-17/pendulum-landing/dispatches \
            -d "{\"event_type\":\"pendulum-release\",\"client_payload\":{\"source_commit\":\"$evidence_source_commit\",\"release_commit\":\"$GITHUB_SHA\",\"tag\":\"$GITHUB_REF_NAME\"}}"
