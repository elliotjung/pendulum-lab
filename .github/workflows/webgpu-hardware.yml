name: WebGPU Hardware Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '41 2 * * 2'

jobs:
  hardware-reductions:
    # This job is intentionally pinned to an owner-provisioned runner with a real
    # GPU/WebGPU stack. GitHub-hosted runners are allowed to lack navigator.gpu;
    # this workflow is the place where absence of an adapter is a failure.
    runs-on: [self-hosted, webgpu]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chrome
      - name: Free Vite test port
        shell: powershell
        run: |
          $listeners = Get-NetTCPConnection -LocalPort 5173 -State Listen -ErrorAction SilentlyContinue
          foreach ($listener in $listeners) {
            Stop-Process -Id $listener.OwningProcess -Force -ErrorAction SilentlyContinue
          }
      - run: npm run test:webgpu-hardware
        env:
          WEBGPU_BROWSER_CHANNEL: chrome
      - run: npm run validate:webgpu-hardware
        env:
          WEBGPU_BROWSER_CHANNEL: chrome
      - run: npm run benchmark:gpu-ladder
        env:
          WEBGPU_BROWSER_CHANNEL: chrome
      - run: npm run benchmark:gpu-matrix
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: webgpu-hardware-playwright-report
          path: |
            reports/playwright/
            reports/webgpu-hardware-validation.*
            reports/gpu-benchmark-ladder.*
            reports/gpu-adapter-matrix.*
