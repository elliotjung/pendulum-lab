name: WebGPU Hardware Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '41 2 * * 2'

permissions:
  contents: read

concurrency:
  group: webgpu-hardware
  cancel-in-progress: false

jobs:
  hardware-reductions:
    # This job is intentionally pinned to an owner-provisioned runner with a real
    # GPU/WebGPU stack. GitHub-hosted runners are allowed to lack navigator.gpu;
    # this workflow is the place where absence of an adapter is a failure.
    runs-on: [self-hosted, webgpu]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chrome
      - name: Require the dedicated Vite test port to be free
        shell: powershell
        run: |
          $listeners = Get-NetTCPConnection -LocalPort 5173 -State Listen -ErrorAction SilentlyContinue
          if ($listeners) {
            $owners = ($listeners | Select-Object -ExpandProperty OwningProcess -Unique) -join ', '
            throw "Port 5173 is already owned by process(es) $owners. Refusing to terminate an unrelated self-hosted-runner process."
          }
      - run: npm run test:webgpu-hardware
        env:
          WEBGPU_BROWSER_CHANNEL: chrome
      - run: npm run validate:webgpu-hardware
        env:
          WEBGPU_BROWSER_CHANNEL: chrome
      - run: npm run benchmark:gpu-ladder
        env:
          WEBGPU_BROWSER_CHANNEL: chrome
      - run: npm run benchmark:gpu-matrix
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: webgpu-hardware-playwright-report
          path: |
            reports/playwright/
            reports/webgpu-hardware-validation.*
            reports/gpu-benchmark-ladder.*
            reports/gpu-adapter-matrix.*
