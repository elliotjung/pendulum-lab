name: Mainline Full Validation

# Runs on every mainline push, on manual dispatch, and as an opt-in lane for
# release-candidate PRs: label a PR `full-validation` and every job below runs
# for each subsequent push to that PR without waiting for the merge.
on:
  push:
    branches: [main, master]
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:

jobs:
  full-validation:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-validation')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run test:slow
      - run: npm run test:coverage
      - run: npm run audit:legacy
      - run: npm run audit:mojibake:strict
      - run: npm run reports
      - run: npm run validate:gpu-scale
      - run: npm run build
      - run: npm run build:standalone
      - run: npm run build:lib
      - run: npm run budget
      - run: npm run docs:api
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: npm run notebook:validate
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run benchmark
      - run: npm run benchmark:memory
      - run: npm run reproduce
      - run: npm run flagship:certify
      - run: npm run flagship:external
      - run: npm run release:package
      - run: npm run reviewer:kit
      # The world-class scorecard reads generated benchmark, memory, reviewer-kit,
      # release, flagship, external-check, and GPU-scale artifacts, so keep it after those producers.
      - run: npm run audit:worldclass
      # Mainline browser suite: smoke, accessibility, research workspace,
      # Trust Inspector, and long-run performance coverage.
      - run: npm run test:e2e:mainline
      # Cross-engine smoke keeps Firefox/WebKit/mobile startup covered without
      # multiplying every long-running research UI spec across all engines.
      - run: npx playwright test e2e/smoke.spec.ts --project=firefox --project=webkit --project=mobile-chrome

  cross-validate:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-validation')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: npm ci
      - run: pip install numpy scipy sympy
      - run: npm run validate:cross
      - run: npm run validate:sympy
      - run: npm run validate:literature

  julia-reference:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-validation')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - run: npm ci
      - run: julia -e 'using Pkg; Pkg.add(["OrdinaryDiffEq","JSON"])'
      - run: npm run validate:julia

  os-smoke:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-validation')
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
