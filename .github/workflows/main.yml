name: Mainline Full Validation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mainline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:deps
      - run: npm run verify
      - run: npm run test:slow
      - run: npm run test:coverage
      - run: npm run audit:legacy
      - run: npm run audit:mojibake:strict
      - run: npm run reports
      - run: npm run validate:gpu-scale
      - run: npm run build
      - run: npm run build:standalone
      # Committed standalone bundle must match what the current source builds.
      - run: npm run check:standalone-sync
      # Same drift contract for the committed WASM ensemble kernel.
      - run: npm run check:wasm-sync
      - run: npm run build:lib
      - run: npm run budget
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-budget
          path: reports/bundle-budget.*
          if-no-files-found: error
      - run: npm run docs:api
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: npm run notebook:validate
      - run: npx playwright install --with-deps chromium firefox webkit
      - name: Audit CSS selector coverage
        shell: bash
        run: |
          npm run preview -- --port 4173 > /tmp/pendulum-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:4173/app.html >/dev/null && break
            [ "$attempt" -lt 30 ] || { cat /tmp/pendulum-preview.log; exit 1; }
            sleep 1
          done
          npm run audit:css-coverage
      - name: Install PDF visual-verification renderer
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      # Exercise the actual double-click/file:// path, including the explicit
      # worker-fallback notice shown when module workers are unavailable.
      - run: npm run smoke:standalone
      # Single-build profile (median of 5 samples + environment metadata).
      # Honest A/B comparison against the merge-base runs on PRs (ci.yml
      # benchmark-compare); mainline keeps the longitudinal memory gate below.
      - run: npm run benchmark
      - run: npm run benchmark:wasm-nchain
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: css-and-wasm-diagnostics
          path: |
            reports/css-coverage.*
            reports/wasm-nchain-baseline.json
          if-no-files-found: error
      # Memory regression is a HARD gate: min(50 MB absolute, 20% relative)
      # growth over the committed baseline (reports/memory-baseline.json).
      - run: npm run benchmark:memory
        env:
          MEMORY_FAIL_ON_REGRESSION: ${{ hashFiles('reports/memory-baseline.json') != '' && '1' || '0' }}
      - run: npm run flagship:certify
      - run: npm run flagship:external
      - run: npm run release:package
      - run: npm run reviewer:kit
      # The world-class scorecard reads generated benchmark, memory, reviewer-kit,
      # release, flagship, external-check, and GPU-scale artifacts, so keep it after those producers.
      - run: npm run audit:worldclass
      # Mainline browser suite: smoke, accessibility, research workspace,
      # Trust Inspector, and long-run performance coverage.
      - run: npm run test:e2e:mainline
      - run: npx playwright test e2e/main-canvas-worker.spec.ts --project=chromium
      # Cross-engine smoke keeps Firefox/WebKit/mobile startup covered without
      # multiplying every long-running research UI spec across all engines.
      - run: npx playwright test e2e/smoke.spec.ts --project=firefox --project=webkit --project=mobile-chrome
      # iPhone-shaped WebKit coverage pins both startup and the project's
      # reviewer-facing Trust Inspector popover on a narrow touch viewport.
      - run: npx playwright test e2e/smoke.spec.ts e2e/trust-inspector.spec.ts --project=mobile-webkit
      - name: Detect promoted Linux visual baselines
        id: linux_visual_baselines
        shell: bash
        run: |
          if compgen -G 'e2e/visual-regression.spec.ts-snapshots/*-linux.png' >/dev/null; then
            echo 'available=true' >> "$GITHUB_OUTPUT"
          else
            echo 'available=false' >> "$GITHUB_OUTPUT"
            echo 'Linux visual baselines are not promoted yet; run Visual Baselines (Linux).'
          fi
      - name: Validate promoted Linux visual baseline contract
        if: steps.linux_visual_baselines.outputs.available == 'true'
        run: npm run test:visual:linux:contract
      - name: Run promoted Linux visual gate
        if: steps.linux_visual_baselines.outputs.available == 'true'
        run: npx playwright test e2e/visual-regression.spec.ts --project=chromium --project=mobile-chrome

  cross-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: npm ci
      - run: pip install numpy scipy sympy
      - run: npm run validate:cross
      - run: npm run validate:sympy
      - run: npm run validate:literature

  julia-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10.11'
      - run: npm ci
      - run: julia --project=julia -e 'using Pkg; Pkg.instantiate()'
      - run: npm run validate:julia
        env:
          JULIA_REQUIRED: '1'

  os-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
