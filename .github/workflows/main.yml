name: Mainline Full Validation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mainline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:deps
      - run: npm run verify
      - run: npm run test:slow
      - run: npm run test:coverage
      - run: npm run audit:legacy
      - run: npm run audit:mojibake:strict
      - run: npm run reports
      - run: npm run validate:gpu-scale
      - run: npm run build
      - run: npm run build:standalone
      - run: npm run build:lib
      - run: npm run budget
      - run: npm run docs:api
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm run notebook:validate
      - run: npx playwright install --with-deps chromium firefox webkit
      # Single-build profile (median of 5 samples + environment metadata).
      # Honest A/B comparison against the merge-base runs on PRs (ci.yml
      # benchmark-compare); mainline keeps the longitudinal memory gate below.
      - run: npm run benchmark
      # Memory regression is a HARD gate: min(50 MB absolute, 20% relative)
      # growth over the committed baseline (reports/memory-baseline.json).
      - run: npm run benchmark:memory
        env:
          MEMORY_FAIL_ON_REGRESSION: ${{ hashFiles('reports/memory-baseline.json') != '' && '1' || '0' }}
      - run: npm run flagship:certify
      - run: npm run flagship:external
      - run: npm run release:package
      - run: npm run reviewer:kit
      # The world-class scorecard reads generated benchmark, memory, reviewer-kit,
      # release, flagship, external-check, and GPU-scale artifacts, so keep it after those producers.
      - run: npm run audit:worldclass
      # Mainline browser suite: smoke, accessibility, research workspace,
      # Trust Inspector, and long-run performance coverage.
      - run: npm run test:e2e:mainline
      # Cross-engine smoke keeps Firefox/WebKit/mobile startup covered without
      # multiplying every long-running research UI spec across all engines.
      - run: npx playwright test e2e/smoke.spec.ts --project=firefox --project=webkit --project=mobile-chrome

  cross-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: pip install numpy scipy sympy
      - run: npm run validate:cross
      - run: npm run validate:sympy
      - run: npm run validate:literature

  julia-reference:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - run: npm ci
      - run: julia -e 'using Pkg; Pkg.add(["OrdinaryDiffEq","JSON"])'
      - run: npm run validate:julia

  os-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
